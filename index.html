</div>

<div class="modal-overlay" id="appSettingsModal" hidden>
  <div class="modal modal-wide">
    <h3>Settings</h3>

    <div class="settings-group toggle-row">
      <p class="settings-label">Dark theme</p>
      <button class="switch" id="modalThemeToggle" role="switch" aria-checked="false"><span class="switch-knob"></span></button>
    </div>

    <div class="settings-group">
      <p class="settings-label">Spin duration</p>
      <div class="pill-group" id="modalDurationGroup">
        <button class="pill-option" data-value="3">3s</button>
        <button class="pill-option is-active" data-value="5">5s</button>
        <button class="pill-option" data-value="8">8s</button>
        <button class="pill-option" data-value="10">10s</button>
      </div>
    </div>

    <div class="settings-group">
      <p class="settings-label">Spin Mode</p>
      <div class="segmented" id="modalModeGroup">
        <button class="segmented-option is-active" data-value="normal">Normal</button>
        <button class="segmented-option" data-value="elimination">Elimination</button>
      </div>
    </div>

    <div class="settings-group toggle-row">
      <p class="settings-label">Sound</p>
      <button class="switch is-on" id="modalSoundToggle" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
    </div>

    <div class="settings-group toggle-row">
      <p class="settings-label">Confetti</p>
      <button class="switch is-on" id="modalConfettiToggle" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
    </div>

    <div class="settings-group">
      <p class="settings-label">Color Theme</p>
      <div class="swatch-group" id="modalThemeSwatches">
        <button class="swatch is-active" data-theme="violet" style="--sw:#7c3aed"></button>
        <button class="swatch" data-theme="blue" style="--sw:#2563eb"></button>
        <button class="swatch" data-theme="teal" style="--sw:#0ea5a4"></button>
        <button class="swatch" data-theme="green" style="--sw:#22c55e"></button>
        <button class="swatch" data-theme="orange" style="--sw:#f97316"></button>
        <button class="swatch" data-theme="pink" style="--sw:#ec4899"></button>
      </div>
    </div>

    <button class="btn btn-ghost btn-block" id="moreSettingsBtn" aria-expanded="false">
      More Settings
      <svg class="icon icon-sm chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>

    <div class="more-settings" id="moreSettingsPanel" hidden>
      <label class="field">
        <span>Winner announcement delay (ms)</span>
        <input type="number" id="announceDelay" value="250" min="0" step="50" />
      </label>
      <label class="field checkbox-field">
        <input type="checkbox" id="allowRepeatWinners" checked />
        <span>Allow repeat winners (Normal mode)</span>
      </label>
      <label class="field checkbox-field">
        <input type="checkbox" id="removeAfterWin" />
        <span>Remove winning item after every spin</span>
      </label>
      <button class="btn btn-ghost btn-block" id="resetDataBtn">Reset prizes to defaults</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" id="closeAppSettings">Done</button>
    </div>
  </div>
</div>

<!-- Winner overlay -->
<canvas id="confettiCanvas" aria-hidden="true"></canvas>

<script src="script.js"></script>
</body>
</html>
